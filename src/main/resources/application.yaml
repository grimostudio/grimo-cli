spring:
  application:
    name: grimo
  main:
    banner-mode: off
  shell:
    interactive:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false

grimo:
  workspace: ${user.home}/grimo-workspace
